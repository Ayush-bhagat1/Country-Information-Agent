apiVersion: apps/v1
kind: Deployment
metadata:
  name: country-agent
  labels:
    app: country-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: country-agent
  template:
    metadata:
      labels:
        app: country-agent
    spec:
      containers:
        - name: country-agent
          image: country-agent:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: country-agent-service
  labels:
    app: country-agent
spec:
  type: LoadBalancer
  selector:
    app: country-agent
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
