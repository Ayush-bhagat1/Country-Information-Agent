<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Information Agent</title>
    <meta name="description" content="Ask questions about any country using our AI agent.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="bg-gradient"></div>

    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">🌍</span>
                <div>
                    <h1>Country Information Agent</h1>
                    <p class="tagline">Powered by LangGraph</p>
                </div>
            </div>
            <span class="status-badge"><span class="dot"></span> Online</span>
        </header>

        <main id="chatArea">
            <div class="welcome" id="welcome">
                <h2>Ask me about any country</h2>
                <p>I can help with population, capitals, currencies, languages, borders, and more.</p>

                <div class="examples">
                    <button class="example-btn" onclick="askExample(this)">
                        <span>🇩🇪</span> What is the population of Germany?
                    </button>
                    <button class="example-btn" onclick="askExample(this)">
                        <span>🇯🇵</span> What currency does Japan use?
                    </button>
                    <button class="example-btn" onclick="askExample(this)">
                        <span>🇧🇷</span> What is the capital and population of Brazil?
                    </button>
                    <button class="example-btn" onclick="askExample(this)">
                        <span>🇮🇳</span> Tell me about India
                    </button>
                    <button class="example-btn" onclick="askExample(this)">
                        <span>🇫🇷</span> What languages are spoken in France?
                    </button>
                    <button class="example-btn" onclick="askExample(this)">
                        <span>🇦🇺</span> What are the borders of Australia?
                    </button>
                </div>
            </div>

            <div id="messages"></div>
        </main>

        <div class="input-bar">
            <div class="input-wrap">
                <input type="text" id="queryInput" placeholder="Ask about any country..." autocomplete="off"
                    maxlength="500">
                <button id="sendBtn" onclick="sendQuery()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <p class="footer-text">Data from REST Countries API · Built with LangGraph + FastAPI</p>
        </div>
    </div>

    <!-- Pipeline details modal -->
    <div class="modal-overlay" id="modal" onclick="closeModal(event)">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Agent Pipeline</h3>
                <button class="modal-close"
                    onclick="document.getElementById('modal').classList.remove('open')">×</button>
            </div>
            <div id="pipelineContent"></div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
